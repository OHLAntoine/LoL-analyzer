<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AphinXSa — Match Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #010131; --blue: #59BFFF; --blue-dim: rgba(89,191,255,0.15);
    --blue-border: rgba(89,191,255,0.3); --white: #e8f4ff;
    --muted: rgba(232,244,255,0.45); --win: #4ade80; --loss: #f87171;
    --warn: #fbbf24;
    --win-bg: rgba(74,222,128,0.08); --loss-bg: rgba(248,113,113,0.08);
  }
  body { background: var(--navy); color: var(--white); font-family: 'Rajdhani', sans-serif; font-size: 16px; min-height: 100vh; padding: 40px 20px 80px; }
  body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(89,191,255,0.012) 4px); pointer-events:none; z-index:9999; }

  /* HEADER */
  header { text-align:center; margin-bottom:48px; }
  .logo-tag { font-family:'Orbitron',monospace; font-size:11px; font-weight:600; letter-spacing:.25em; color:var(--blue); text-transform:uppercase; margin-bottom:12px; }
  h1 { font-family:'Orbitron',monospace; font-size:clamp(22px,4vw,36px); font-weight:900; line-height:1.1; }
  h1 span { color:var(--blue); }
  .subtitle { margin-top:8px; color:var(--muted); font-size:15px; letter-spacing:.05em; }

  /* FORM */
  .form-card { max-width:520px; margin:0 auto 48px; background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:4px; padding:32px; }
  .field { margin-bottom:20px; }
  .field:last-of-type { margin-bottom:28px; }
  label { display:block; font-family:'Orbitron',monospace; font-size:10px; font-weight:600; letter-spacing:.2em; color:var(--blue); text-transform:uppercase; margin-bottom:8px; }
  input[type="number"] { width:100%; background:rgba(1,1,49,0.8); border:1px solid var(--blue-border); border-radius:2px; color:var(--white); font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:500; padding:12px 16px; outline:none; transition:border-color .2s; }
  input:focus { border-color:var(--blue); }
  .hint { margin-top:6px; font-size:12px; color:var(--muted); }
  .btn-analyze { width:100%; background:var(--blue); border:none; border-radius:2px; color:var(--navy); cursor:pointer; font-family:'Orbitron',monospace; font-size:13px; font-weight:700; letter-spacing:.15em; padding:16px; text-transform:uppercase; transition:opacity .2s,transform .1s; }
  .btn-analyze:hover { opacity:.88; }
  .btn-analyze:active { transform:scale(.99); }
  .btn-analyze:disabled { opacity:.4; cursor:not-allowed; }

  /* STATUS */
  #status { max-width:520px; margin:0 auto 32px; font-size:14px; color:var(--muted); text-align:center; min-height:20px; letter-spacing:.05em; }
  #status.error { color:var(--loss); }

  /* RESULTS */
  #results { max-width:960px; margin:0 auto; display:none; }

  /* SECTION TITLE */
  .section-title { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; letter-spacing:.2em; color:var(--blue); text-transform:uppercase; margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--blue-border); margin-top:40px; }
  .section-title:first-child { margin-top:0; }

  /* SUMMARY GRID */
  .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(105px,1fr)); gap:10px; margin-bottom:8px; }
  .stat-box { background:var(--blue-dim); border:1px solid var(--blue-border); border-radius:3px; padding:16px 12px; text-align:center; }
  .stat-box .val { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--blue); line-height:1; }
  .stat-box .lbl { margin-top:6px; font-size:10px; font-weight:600; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; }

  /* TILT ALERT */
  .tilt-alert { margin:16px 0 8px; padding:16px 20px; border-radius:3px; font-size:14px; font-weight:600; letter-spacing:.03em; border-left:3px solid; line-height:1.5; }
  .tilt-alert.danger  { background:rgba(248,113,113,0.1);  border-color:var(--loss); color:var(--loss); }
  .tilt-alert.warning { background:rgba(251,191,36,0.08);  border-color:var(--warn); color:var(--warn); }
  .tilt-alert.ok      { background:rgba(74,222,128,0.08);  border-color:var(--win);  color:var(--win); }

  /* TABS */
  .tabs { display:flex; gap:4px; margin-bottom:0; border-bottom:1px solid var(--blue-border); margin-top:40px; }
  .tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; font-family:'Orbitron',monospace; font-size:10px; font-weight:600; letter-spacing:.15em; padding:10px 18px; text-transform:uppercase; transition:color .2s,border-color .2s; margin-bottom:-1px; }
  .tab-btn:hover { color:var(--white); }
  .tab-btn.active { color:var(--blue); border-bottom-color:var(--blue); }
  .tab-panel { display:none; padding-top:24px; }
  .tab-panel.active { display:block; }

  /* STREAK PIPS */
  .streak-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
  .streak-pip { width:26px; height:26px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; font-family:'Orbitron',monospace; cursor:default; }
  .streak-pip.W { background:rgba(74,222,128,0.2); color:var(--win); border:1px solid rgba(74,222,128,0.35); }
  .streak-pip.L { background:rgba(248,113,113,0.12); color:var(--loss); border:1px solid rgba(248,113,113,0.28); }

  /* LP CHART */
  .chart-wrap { background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:3px; padding:20px; margin-bottom:8px; }
  canvas { width:100%; display:block; }

  /* CHAMPION GRID */
  .champ-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .champ-card { background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:3px; padding:16px; }
  .champ-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .champ-name { font-family:'Orbitron',monospace; font-size:12px; font-weight:700; color:var(--white); }
  .champ-wr { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; }
  .champ-row { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); padding:3px 0; border-bottom:1px solid rgba(89,191,255,0.06); }
  .champ-row:last-child { border:none; }
  .champ-row strong { color:var(--white); }

  /* TILT PATTERN */
  .tilt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .tilt-card { background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:3px; padding:18px; }
  .tilt-card h4 { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:.15em; color:var(--blue); text-transform:uppercase; margin-bottom:14px; }
  .hour-bar-wrap { display:flex; flex-direction:column; gap:6px; }
  .hour-bar-row { display:flex; align-items:center; gap:10px; font-size:12px; }
  .hour-label { width:54px; color:var(--muted); flex-shrink:0; }
  .hour-bar-bg { flex:1; background:rgba(89,191,255,0.08); border-radius:2px; height:14px; overflow:hidden; }
  .hour-bar-fill { height:100%; border-radius:2px; transition:width .4s; }
  .hour-stat { width:40px; text-align:right; color:var(--muted); font-size:11px; flex-shrink:0; }
  .after-loss-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid rgba(89,191,255,0.06); font-size:13px; }
  .after-loss-row:last-child { border:none; }
  .after-loss-label { color:var(--muted); }
  .after-loss-wr { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; }

  /* ADVANCED STATS */
  .adv-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
  .adv-card { background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:3px; padding:16px; }
  .adv-card h4 { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:.15em; color:var(--blue); text-transform:uppercase; margin-bottom:12px; }
  .adv-val { font-family:'Orbitron',monospace; font-size:28px; font-weight:900; color:var(--white); line-height:1; }
  .adv-sub { font-size:12px; color:var(--muted); margin-top:4px; }
  .adv-bar-bg { margin-top:10px; background:rgba(89,191,255,0.1); border-radius:2px; height:4px; }
  .adv-bar-fill { height:4px; border-radius:2px; }

  /* ELO BENCHMARK */
  .bench-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
  .bench-card { background:rgba(89,191,255,0.04); border:1px solid var(--blue-border); border-radius:3px; padding:16px; }
  .bench-card h4 { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:.15em; color:var(--blue); text-transform:uppercase; margin-bottom:12px; }
  .bench-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(89,191,255,0.06); font-size:13px; }
  .bench-row:last-child { border:none; }
  .bench-metric { color:var(--muted); }
  .bench-vals { display:flex; gap:16px; font-family:'Orbitron',monospace; font-size:12px; font-weight:700; }
  .bench-you { color:var(--white); }
  .bench-avg { color:var(--muted); font-weight:400; }
  .bench-delta { font-size:11px; }
  .bench-delta.pos { color:var(--win); }
  .bench-delta.neg { color:var(--loss); }
  .bench-delta.neu { color:var(--muted); }

  /* MATCH LIST */
  .match-list { display:flex; flex-direction:column; gap:6px; }
  .match-row { display:grid; grid-template-columns:5px 100px auto 1fr auto auto auto auto; align-items:center; gap:12px; padding:12px 16px; border-radius:3px; border:1px solid transparent; font-size:13px; }
  .match-row.win  { background:var(--win-bg);  border-color:rgba(74,222,128,0.18); }
  .match-row.loss { background:var(--loss-bg); border-color:rgba(248,113,113,0.18); }
  .match-pip { width:5px; height:5px; border-radius:50%; }
  .match-row.win  .match-pip { background:var(--win); box-shadow:0 0 5px var(--win); }
  .match-row.loss .match-pip { background:var(--loss); box-shadow:0 0 5px var(--loss); }
  .match-champ { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; }
  .match-result { font-weight:700; font-size:11px; letter-spacing:.1em; }
  .match-row.win  .match-result { color:var(--win); }
  .match-row.loss .match-result { color:var(--loss); }
  .match-role { font-size:11px; color:var(--muted); background:rgba(89,191,255,0.08); border:1px solid var(--blue-border); border-radius:2px; padding:1px 6px; text-align:center; }
  .match-kda { color:var(--white); font-weight:600; }
  .match-cs, .match-dur { color:var(--muted); }
  .match-dmg { color:rgba(232,244,255,0.6); font-size:12px; }
  .match-ago { color:rgba(232,244,255,0.28); font-size:11px; text-align:right; }

  /* COACH SECTION */
  .coach-block { background:rgba(89,191,255,0.05); border:1px solid var(--blue-border); border-radius:3px; padding:24px; margin-bottom:12px; }
  .coach-block h3 { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; color:var(--blue); letter-spacing:.15em; text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .coach-block h3 .badge { font-size:14px; }
  .coach-item { padding:12px 0; border-bottom:1px solid rgba(89,191,255,0.07); }
  .coach-item:last-child { border:none; padding-bottom:0; }
  .coach-item-title { font-weight:700; color:var(--white); font-size:14px; margin-bottom:5px; display:flex; gap:8px; align-items:center; }
  .coach-item-title .icon { font-size:16px; }
  .coach-item-body { font-size:13px; color:rgba(232,244,255,0.7); line-height:1.65; }

  /* PRIORITY BADGE */
  .prio { font-family:'Orbitron',monospace; font-size:9px; font-weight:700; letter-spacing:.1em; padding:2px 7px; border-radius:2px; text-transform:uppercase; }
  .prio.high   { background:rgba(248,113,113,0.15); color:var(--loss); border:1px solid rgba(248,113,113,0.3); }
  .prio.medium { background:rgba(251,191,36,0.12);  color:var(--warn); border:1px solid rgba(251,191,36,0.3); }
  .prio.low    { background:rgba(74,222,128,0.1);   color:var(--win);  border:1px solid rgba(74,222,128,0.25); }

  @media(max-width:640px) {
    .tilt-grid { grid-template-columns:1fr; }
    .match-row { grid-template-columns:5px 80px 1fr auto; }
    .match-role,.match-cs,.match-dur,.match-dmg { display:none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-tag">AphinXSa · On Progresse Ensemble</div>
  <h1>Match <span>Analyzer</span></h1>
  <p class="subtitle">Analyse avancée — champion, tilt, stats, benchmark elo</p>
</header>

<div class="form-card">
  <div class="field">
    <label>Nombre de parties à analyser</label>
    <input type="number" id="gameCount" min="5" max="50" value="20">
    <p class="hint">Entre 5 et 50 parties ranked SoloQ</p>
  </div>
  <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">▶ &nbsp; Lancer l'analyse</button>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const API_KEY   = 'RGAPI-46ae4afb-1e43-404b-8ae0-735476e528d7';
const GAME_NAME = 'AphinXSa';
const TAG_LINE  = 'Ahjin';
// ════════════════════════════════════════════════

// Benchmarks Emeraude (ADC) — moyennes approximatives tirées des stats publiques
const EMERALD_BENCH = {
  kda:      3.2,
  csPerMin: 7.8,
  vision:   21,
  killParticipation: 62,   // %
  damageShare:       26,   // % des dégâts d'équipe
  dmgPerMin:        580,
  deathsPer10:      2.8,
};

const RIOT_EU = 'https://europe.api.riotgames.com';

async function fetchRiot(url) {
  const res = await fetch(url, { headers: { 'X-Riot-Token': API_KEY } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`HTTP ${res.status} — ${err?.status?.message || 'Erreur API'}`);
  }
  return res.json();
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

function msToMin(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s`;
}

function secToMin(s) {
  return `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s`;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(h / 24);
  if (d > 0) return `il y a ${d}j`;
  if (h > 0) return `il y a ${h}h`;
  return 'récemment';
}

function color(val, good, bad, reverse = false) {
  if (reverse) { const t = good; good = bad; bad = t; }
  if (val >= good) return 'var(--win)';
  if (val <= bad)  return 'var(--loss)';
  return 'var(--warn)';
}

async function runAnalysis() {
  const count = parseInt(document.getElementById('gameCount').value) || 20;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('results').style.display = 'none';

  try {
    setStatus('⏳ Récupération du compte…');
    const account = await fetchRiot(`${RIOT_EU}/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(GAME_NAME)}/${encodeURIComponent(TAG_LINE)}`);
    const puuid = account.puuid;

    setStatus('⏳ Récupération des IDs de parties…');
    const matchIds = await fetchRiot(`${RIOT_EU}/lol/match/v5/matches/by-puuid/${puuid}/ids?queue=420&type=ranked&start=0&count=${count}`);

    if (!matchIds.length) { setStatus('Aucune partie ranked trouvée.', true); btn.disabled = false; return; }

    setStatus(`⏳ Chargement de ${matchIds.length} parties…`);
    const matches = [];
    for (let i = 0; i < matchIds.length; i += 2) {
      const batch = matchIds.slice(i, i + 2).map(id => fetchRiot(`${RIOT_EU}/lol/match/v5/matches/${id}`));
      matches.push(...await Promise.all(batch));
      setStatus(`⏳ ${matches.length} / ${matchIds.length} parties chargées…`);
      if (i + 2 < matchIds.length) await new Promise(r => setTimeout(r, 550));
    }

    setStatus('✅ Analyse terminée !');
    renderResults(matches, puuid);
  } catch (e) {
    setStatus(`Erreur : ${e.message}`, true);
  }
  btn.disabled = false;
}

function renderResults(matches, puuid) {
  // ── Extract ──
  const games = matches.map(m => {
    const p = m.info.participants.find(x => x.puuid === puuid);
    const teamId = p.teamId;
    const teamKills = m.info.participants.filter(x => x.teamId === teamId).reduce((s, x) => s + x.kills, 0);
    const teamDmg   = m.info.participants.filter(x => x.teamId === teamId).reduce((s, x) => s + x.totalDamageDealtToChampions, 0);
    const durationMin = m.info.gameDuration / 60;
    return {
      champion: p.championName,
      role: p.teamPosition || p.individualPosition || 'UNKNOWN',
      win: p.win,
      kills: p.kills, deaths: p.deaths, assists: p.assists,
      cs: p.totalMinionsKilled + p.neutralMinionsKilled,
      csPerMin: ((p.totalMinionsKilled + p.neutralMinionsKilled) / durationMin),
      vision: p.visionScore,
      damage: p.totalDamageDealtToChampions,
      dmgPerMin: p.totalDamageDealtToChampions / durationMin,
      killParticipation: teamKills > 0 ? Math.round(((p.kills + p.assists) / teamKills) * 100) : 0,
      damageShare: teamDmg > 0 ? Math.round((p.totalDamageDealtToChampions / teamDmg) * 100) : 0,
      duration: m.info.gameDuration,
      timestamp: m.info.gameStartTimestamp,
      hour: new Date(m.info.gameStartTimestamp).getHours(),
    };
  }).sort((a, b) => b.timestamp - a.timestamp);

  // ── Global stats ──
  const n = games.length;
  const wins = games.filter(g => g.win).length;
  const losses = n - wins;
  const wr = Math.round((wins / n) * 100);
  const avgKda = (games.reduce((s,g) => s + (g.deaths===0 ? (g.kills+g.assists) : (g.kills+g.assists)/g.deaths), 0) / n);
  const avgCs = Math.round(games.reduce((s,g) => s + g.cs, 0) / n);
  const avgCsMin = (games.reduce((s,g) => s + g.csPerMin, 0) / n);
  const avgVision = Math.round(games.reduce((s,g) => s + g.vision, 0) / n);
  const avgKP = Math.round(games.reduce((s,g) => s + g.killParticipation, 0) / n);
  const avgDmgShare = Math.round(games.reduce((s,g) => s + g.damageShare, 0) / n);
  const avgDmgMin = Math.round(games.reduce((s,g) => s + g.dmgPerMin, 0) / n);
  const avgDeathsPer10 = ((games.reduce((s,g) => s + g.deaths, 0) / n) / (games.reduce((s,g) => s + g.duration, 0) / n / 60) * 10);

  // ── Streaks ──
  let maxLossStreak = 0, curLoss = 0;
  let maxWinStreak  = 0, curWin  = 0;
  games.forEach(g => {
    if (!g.win) { curLoss++; maxLossStreak = Math.max(maxLossStreak, curLoss); curWin = 0; }
    else        { curWin++;  maxWinStreak  = Math.max(maxWinStreak,  curWin);  curLoss = 0; }
  });
  let currentStreak = 0, currentStreakType = games[0]?.win ? 'W' : 'L';
  for (const g of games) {
    if ((g.win && currentStreakType==='W') || (!g.win && currentStreakType==='L')) currentStreak++;
    else break;
  }

  // ── Tilt pattern: winrate after N consecutive losses ──
  const afterLoss = {};
  for (let i = 1; i < games.length; i++) {
    let streak = 0;
    for (let j = i - 1; j >= 0 && !games[j].win; j--) streak++;
    if (streak >= 1) {
      if (!afterLoss[streak]) afterLoss[streak] = { wins:0, total:0 };
      afterLoss[streak].wins  += games[i].win ? 1 : 0;
      afterLoss[streak].total += 1;
    }
  }

  // ── Tilt pattern: winrate by hour ──
  const hourMap = {};
  games.forEach(g => {
    if (!hourMap[g.hour]) hourMap[g.hour] = { wins:0, total:0 };
    hourMap[g.hour].wins  += g.win ? 1 : 0;
    hourMap[g.hour].total += 1;
  });
  const hours = Object.entries(hourMap).sort((a,b) => Number(a[0]) - Number(b[0]));

  // ── LP estimation ──
  const reversed = [...games].reverse();
  const lpPoints = [];
  let lp = 0;
  reversed.forEach(g => { lp += g.win ? 18 : -15; lpPoints.push(lp); });

  // ── Champion breakdown ──
  const champMap = {};
  games.forEach(g => {
    if (!champMap[g.champion]) champMap[g.champion] = { wins:0, games:0, kills:0, deaths:0, assists:0, cs:0, csMin:0, vision:0, kp:0, dmgMin:0 };
    const c = champMap[g.champion];
    c.games++; if (g.win) c.wins++;
    c.kills+=g.kills; c.deaths+=g.deaths; c.assists+=g.assists;

  if (canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth || 800;
    canvas.height = 160;
    const pts = lpPoints;
    const minLp = Math.min(...pts), maxLp = Math.max(...pts);
    const pad = {t:16,r:20,b:28,l:44};
    const W = canvas.width - pad.l - pad.r;
    const H = canvas.height - pad.t - pad.b;
    const range = (maxLp - minLp) || 1;
    const ptX = i => pad.l + i * (W / (pts.length - 1));
    const ptY = v => pad.t + H - ((v - minLp) / range) * H;

    ctx.strokeStyle = 'rgba(89,191,255,0.07)'; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + (H/4)*i;
      ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+W, y); ctx.stroke();
      const v = Math.round(maxLp - ((maxLp-minLp)/4)*i);
      ctx.fillStyle='rgba(232,244,255,0.28)'; ctx.font='10px Rajdhani'; ctx.textAlign='right';
      ctx.fillText((v>=0?'+':'')+v, pad.l-6, y+4);
    }
    if (minLp < 0 && maxLp > 0) {
      ctx.strokeStyle='rgba(89,191,255,0.22)'; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(pad.l, ptY(0)); ctx.lineTo(pad.l+W, ptY(0)); ctx.stroke();
      ctx.setLineDash([]);
    }
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+H);
    grad.addColorStop(0,'rgba(89,191,255,0.22)'); grad.addColorStop(1,'rgba(89,191,255,0)');
    ctx.beginPath(); ctx.moveTo(ptX(0), ptY(pts[0]));
    pts.forEach((v,i) => ctx.lineTo(ptX(i), ptY(v)));
    ctx.lineTo(ptX(pts.length-1), pad.t+H); ctx.lineTo(ptX(0), pad.t+H);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); ctx.strokeStyle='#59BFFF'; ctx.lineWidth=2; ctx.lineJoin='round';
    pts.forEach((v,i) => i===0 ? ctx.moveTo(ptX(i),ptY(v)) : ctx.lineTo(ptX(i),ptY(v)));
    ctx.stroke();
    pts.forEach((v,i) => {
      ctx.beginPath(); ctx.arc(ptX(i), ptY(v), 3.5, 0, Math.PI*2);
      ctx.fillStyle = reversed[i]?.win ? '#4ade80' : '#f87171'; ctx.fill();
    });
  }

  setStatus('');
}

function switchTab(e, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById(id).classList.add('active');
  // redraw chart if switching to tilt tab
  if (id === 'tab-tilt') {
    setTimeout(() => {
      const c = document.getElementById('lpChart');
      if (c && c._rendered) return;
      if (c) c._rendered = true;
    }, 50);
  }
}
</script>
